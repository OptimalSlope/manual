<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Section Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background:  #949596
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background-color:  #949596
  </style>
</head>
<body>
  <model-viewer
    src="https://optimalslope.github.io/manual/assets/glb/out_glb.glb"
    camera-controls
    auto-rotate
    shadow-intensity="1">
  </model-viewer>
</body>
</html>
